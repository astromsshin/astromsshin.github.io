  <title>Current status</title>
  <style>
  #clock {
    color: black;
    align-items: center;
    justify-content: center;
    font-size: 100px;
  }
  </style>
  <script>
      function updateImage(imgElement) {
        var image = document.getElementById(imgElement);
        image.src = image.src.split("?")[0] + "?" + new Date().getTime();
      }
      function refreshIt() {
        document.images['img1'].src = './pm_use.png?' + new Date().getTime();
        document.images['img2'].src = './weather_use.png?' + new Date().getTime();
        document.images['img3'].src = './weather_radar_use.png?' + new Date().getTime();
        document.images['img4'].src = './weather_aws_rain_use.png?' + new Date().getTime();
        document.images['img5'].src = './weather_forecast_use.png?' + new Date().getTime();
        setTimeout('refreshIt()', 60000);
      }
  </script>
</head>

<body onLoad="setTimeout('refreshIt()',60000)">

<center>
<div id="clock"></div>
<script>
  function clock() {
    let date = new Date();
    let hrs = date.getHours();
    let mins = date.getMinutes();

    hrs = hrs < 10 ? `0${hrs}` : hrs;
    mins = mins < 10 ? `0${mins}` : mins;
                              
    let time = `${hrs}:${mins}`;
    setInterval(clock, 5000);
    document.getElementById("clock").innerText = time;
  }
  clock();
</script>
<img name="img1" src="./pm_use.png">
<br>
<img name="img2" src="./weather_use.png">
<br>
<img name="img3" src="./weather_radar_use.png"> <img name="img4" src="./weather_aws_rain_use.png">
<br>
<img name="img5" src="./weather_forecast_use.png">
</center>
